services:
  kafka:
    image: apache/kafka:latest
    container_name: detonator-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — single-node controller + broker
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners — PLAINTEXT for internal, PLAINTEXT_HOST for external (WSL host)
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Auto-create topics when the producer first writes
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Retain data for 24 hours (dev convenience)
      KAFKA_LOG_RETENTION_HOURS: 24
      # Cluster ID for KRaft (must be a valid UUID-like base64 string)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
